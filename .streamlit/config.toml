[server]
enableXsrfProtection = false
enableCORS = false
headless = true
# port/address は HF Spaces SDK / Cloud Run のCLI引数が優先 (config未指定で柔軟対応)
maxUploadSize = 200
enableWebsocketCompression = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true

[logger]
level = "info"

# v6: ブランドカラーテーマ (SHOUCHIKU8)
[theme]
primaryColor = "#2563eb"          # 青系メインカラー
backgroundColor = "#fafafa"        # 明るいグレー
secondaryBackgroundColor = "#ffffff"  # サイドバー白
textColor = "#1f2937"              # ダークグレー
font = "sans serif"
